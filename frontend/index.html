<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Doom Scrolling</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="noise-overlay"></div>

    <button id="library-btn" class="floating-btn">📚 Curriculum</button>

    <div id="menu-overlay" class="menu-hidden">
        <div class="menu-header">
            <h2>Select a Topic</h2>
            <button id="close-menu-btn">✖</button>
        </div>
        <ul id="topic-list">
            <li class="loading-topics">Loading your curriculum...</li>
        </ul>
    </div>
    
<main class="scroll-container" id="feed">
        <section class="card" id="welcome-card">
            <div class="card-content">
                <h2>🧠 AI Doom Scrolling</h2>
                <p>Welcome to your AI-powered study session. Select your AI engine and pick a topic to begin.</p>
                
                <div class="settings-group">
                    <label for="modelSelect">AI Engine:</label>
                    <select id="modelSelect" class="lofi-select">
                        <option value="gemini-1.5-flash">GEMINI 1.5 FLASH (Legacy Speed)</option>
                        <option value="gemini-1.5-pro">GEMINI 1.5 PRO (Legacy Reasoning)</option>
                        <option value="gemini-2.5-flash">GEMINI 2.5 FLASH (Stable)</option>
                        <option value="gemini-3-flash-preview" selected>GEMINI 3 FLASH (Next-Gen Speed)</option>
                    </select>
                </div>

                <button id="start-btn" class="continue-btn">Select Topic</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
